name: Update Bloom Offset

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜 UTC 0:00（JST 9:00）
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Update bloom offset data
        run: node scripts/update-bloom-offset.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/bloom-offset.json
          git diff --staged --quiet || git commit -m "chore: update bloom offset data $(date +%Y-%m-%d)"
          git push
